<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moriarty Group – Managers Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#f4f5f0;color:#1a1f18;min-height:100vh;padding-bottom:40px;}
.app-header{background:#00703c;color:white;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.app-header .brand{font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
.app-header .sub{font-size:11px;opacity:0.7;margin-top:1px;}
.app-header .logo-row{display:flex;align-items:center;justify-content:space-between;}
.sv-badge{background:white;color:#00703c;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.05em;}
.store-bar{background:#005a30;padding:8px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.store-bar::-webkit-scrollbar{display:none;}
.store-btn{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);color:white;padding:6px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all 0.15s;}
.store-btn.active{background:white;color:#00703c;border-color:white;}
.store-btn.disabled{opacity:0.4;cursor:not-allowed;}
.content{padding:14px;}
.loading{text-align:center;padding:60px 20px;color:#6b7266;}
.loading .spin{font-size:32px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.error-state{text-align:center;padding:40px 20px;color:#c8102e;}
.card{background:white;border-radius:12px;border:1px solid #d8dbd2;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#6b7266;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';display:block;width:3px;height:13px;background:#00703c;border-radius:2px;}
.section-list{list-style:none;padding:0;}
.section-list li{padding:9px 0;border-bottom:1px solid #f0f2ee;font-size:14px;line-height:1.5;padding-left:14px;position:relative;}
.section-list li:last-child{border-bottom:none;}
.section-list li::before{content:'\2022';position:absolute;left:0;color:#00703c;font-weight:700;}
.action-list{list-style:none;padding:0;counter-reset:action-counter;}
.action-list li{padding:9px 0 9px 28px;border-bottom:1px solid #f0f2ee;font-size:14px;line-height:1.5;position:relative;counter-increment:action-counter;}
.action-list li:last-child{border-bottom:none;}
.action-list li::before{content:counter(action-counter);position:absolute;left:0;top:9px;background:#00703c;color:white;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:20px;text-align:center;}
.generated-badge{background:#f4f5f0;border:1px solid #d8dbd2;border-radius:6px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:10px;color:#6b7266;text-align:center;margin-bottom:12px;}
.week-banner{background:#00703c;color:white;border-radius:10px;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.week-banner-label{font-size:10px;font-weight:700;letter-spacing:0.08em;opacity:0.8;text-transform:uppercase;}
.week-banner-value{font-size:16px;font-weight:700;margin-top:2px;}
.week-banner-right{text-align:right;}
.week-banner-store{font-size:11px;opacity:0.75;}
.week-banner-gen{font-size:10px;opacity:0.6;margin-top:4px;font-family:'DM Mono',monospace;}
.week-glance{background:#005a30;color:white;border-radius:10px;padding:14px;margin-bottom:12px;}
.week-glance-title{font-size:10px;font-weight:700;letter-spacing:0.08em;opacity:0.8;text-transform:uppercase;margin-bottom:10px;}
.week-glance-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.week-glance-item{background:rgba(255,255,255,0.12);border-radius:8px;padding:10px;}
.week-glance-label{font-size:9px;opacity:0.75;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.week-glance-val{font-size:16px;font-weight:700;}
.week-glance-val.red{color:#ff6b6b;}
.pnl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;}
.pnl-table{width:100%;border-collapse:collapse;font-size:11px;min-width:750px;}
.pnl-table th{background:#00703c;color:white;padding:8px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}
.pnl-table th:first-child{text-align:left;position:sticky;left:0;background:#00703c;z-index:2;}
.pnl-table td{padding:8px;border-bottom:1px solid #f0f2ee;text-align:right;white-space:nowrap;font-family:'DM Mono',monospace;font-size:11px;}
.pnl-table td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;position:sticky;left:0;background:white;z-index:1;min-width:120px;}
.pnl-table tr:nth-child(even) td{background:#fafbf9;}
.pnl-table tr:nth-child(even) td:first-child{background:#fafbf9;}
.pnl-table tr.total-row td{background:#e8f0eb;font-weight:700;border-top:2px solid #00703c;}
.pnl-table tr.total-row td:first-child{background:#e8f0eb;font-family:'DM Sans',sans-serif;font-weight:700;}
.pnl-table .pos{color:#00703c;}
.pnl-table .neg{color:#c8102e;}
</style>
</head>
<body>
<script>
(function() {
  var SESSION_KEY = 'portal_session';
  var THIS_PAGE = window.location.pathname.split('/').pop() || 'index.html';
  var IS_HACCP = window.location.pathname.indexOf('haccp-system') !== -1;
  var LOGIN_URL = IS_HACCP
    ? 'https://aarondoyle2026.github.io/haccp-system/login.html'
    : 'https://aarondoyle2026.github.io/login.html';

  var PAGE_ACCESS = {
    'index.html':           ['admin','store_manager','duty','deli','butcher','shopfloor','fv','hr'],
    'ai-insights.html':     ['admin','store_manager','duty'],
    'appraisals.html':      ['admin','store_manager','duty','hr'],
    'claims.html':          ['admin','store_manager','duty'],
    'dockets.html':         ['admin','store_manager','duty','shopfloor'],
    'fire-drill.html':      ['admin','store_manager','duty','hr'],
    'managers-report.html': ['admin','store_manager','duty'],
    'reports.html':         ['admin','store_manager','duty'],
    'roster.html':          ['admin','store_manager','duty','hr'],
    'rtw_form.html':        ['admin','store_manager','duty','hr'],
    'sales_analysis.html':  ['admin','store_manager','duty'],
    'training.html':        ['admin','store_manager','duty','hr'],
    'push_data.html':       ['admin'],
    'records.html':         ['admin','store_manager','duty','deli','butcher','shopfloor','fv','hr'],
    'report.html':          ['admin','store_manager','duty'],
    'formview.html':        ['admin','store_manager','duty','deli','butcher','shopfloor','fv','hr']
  };

  var raw = sessionStorage.getItem(SESSION_KEY);
  if (!raw) { window.location.href = LOGIN_URL; return; }

  var session;
  try { session = JSON.parse(raw); } catch(e) {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = LOGIN_URL;
    return;
  }

  if (!session || !session.user) {
    window.location.href = LOGIN_URL;
    return;
  }

  var role = session.user.role;
  var allowed = PAGE_ACCESS[THIS_PAGE] || ['admin'];
  var canAccess = false;
  for (var i = 0; i < allowed.length; i++) {
    if (allowed[i] === role) { canAccess = true; break; }
  }

  if (!canAccess) { window.location.href = LOGIN_URL; return; }

  window.PORTAL_USER = session.user;
  window.PORTAL_ROLE = role;
  window.PORTAL_STORE = session.user.store_code;
  window.PORTAL_STORES = session.user.allowed_stores || [];
})();
</script>

<div class="app-header">
  <div class="logo-row">
    <div><div class="brand">Moriarty Group</div><div class="sub">SuperValu · Managers Report</div></div>
    <div class="sv-badge">SUPERVALU</div>
  </div>
</div>

<div class="store-bar">
  <button class="store-btn disabled">Palmerstown</button>
  <button class="store-btn disabled">Balbriggan</button>
  <button class="store-btn active" onclick="selectStore('Skerries',this)">Skerries</button>
</div>

<div class="content" id="main-content">
  <div class="loading"><div class="spin">⚙</div><div>Loading report...</div></div>
</div>

<script>
var currentStore = 'Skerries';
var reportData = null;
var DATA_URL = 'https://aarondoyle2026.github.io/data/managers_report_ai.json';

function selectStore(store, btn) {
  if (btn.classList.contains('disabled')) return;
  currentStore = store;
  document.querySelectorAll('.store-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderReport();
}

function loadData() {
  var el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"><div class="spin">⚙</div><div>Loading report...</div></div>';
  fetch(DATA_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { reportData = data; renderReport(); })
    .catch(function() {
      el.innerHTML = '<div class="error-state"><div style="font-size:32px;margin-bottom:12px;">⚠️</div><div style="font-size:15px;font-weight:700;">Could not load report</div><div style="font-size:13px;margin-top:6px;color:#6b7266;">Run the script to generate the latest report</div></div>';
    });
}

function fmt(n) {
  if (n === null || n === undefined || n === '') return '—';
  var v = Number(n);
  if (isNaN(v)) return '—';
  return '\u20ac' + v.toLocaleString('en-IE', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtPct(n) {
  if (n === null || n === undefined || n === '') return '—';
  var v = Number(n);
  if (isNaN(v)) return '—';
  return v.toFixed(2) + '%';
}

function fmtDate(str) {
  if (!str) return '—';
  try { return new Date(str).toLocaleString('en-IE', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return str; }
}

function renderPnlTable(deps) {
  if (!deps) return '';
  var rows = [];
  if (Array.isArray(deps)) {
    rows = deps;
  } else {
    var order = ['Cigarettes','Beef','Lamb','Pork','Bacon & Loose S.R.P','Poultry','Fish','Produce','Deli','Provisions','TOTAL'];
    order.forEach(function(k) {
      if (deps[k]) {
        var d = deps[k];
        rows.push({
          dept: k,
          purchases: d.purchases,
          opening_stock: d.opening,
          closing_stock: d.closing,
          sales_ex_vat: d.sales,
          transfers: null,
          cost_of_sales: d.cos,
          profit: d.profit,
          act_margin_pct: d.margin_pct,
          scan_margin_pct: d.scan_pct,
        });
      }
    });
  }
  if (!rows.length) return '';
  var html = '<div class="pnl-wrap"><table class="pnl-table">';
  html += '<thead><tr>';
  html += '<th>Dept</th>';
  html += '<th>Purchases</th>';
  html += '<th>Opening</th>';
  html += '<th>Closing</th>';
  html += '<th>Sales Ex VAT</th>';
  html += '<th>Transfers</th>';
  html += '<th>Cost of Sales</th>';
  html += '<th>Profit</th>';
  html += '<th>Act Margin</th>';
  html += '<th>Scan Margin</th>';
  html += '</tr></thead><tbody>';
  rows.forEach(function(row) {
    var isTotal = row.dept === 'TOTAL';
    html += '<tr' + (isTotal ? ' class="total-row"' : '') + '>';
    html += '<td>' + (row.dept || '') + '</td>';
    html += '<td>' + fmt(row.purchases) + '</td>';
    html += '<td>' + fmt(row.opening_stock) + '</td>';
    html += '<td>' + fmt(row.closing_stock) + '</td>';
    html += '<td>' + fmt(row.sales_ex_vat) + '</td>';
    html += '<td>' + fmt(row.transfers) + '</td>';
    html += '<td>' + fmt(row.cost_of_sales) + '</td>';
    var profitClass = row.profit !== null && row.profit !== undefined ? (Number(row.profit) >= 0 ? 'pos' : 'neg') : '';
    html += '<td class="' + profitClass + '">' + fmt(row.profit) + '</td>';
    var mgClass = row.act_margin_pct !== null && row.act_margin_pct !== undefined ? (Number(row.act_margin_pct) >= 0 ? 'pos' : 'neg') : '';
    html += '<td class="' + mgClass + '">' + fmtPct(row.act_margin_pct) + '</td>';
    html += '<td>' + fmtPct(row.scan_margin_pct) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderReport() {
  var el = document.getElementById('main-content');
  if (!reportData) { loadData(); return; }
  var d = reportData;
  var html = '';

  html += '<div class="week-banner">';
  html += '<div><div class="week-banner-label">Week Ending</div><div class="week-banner-value">' + (d.week_ending || '—') + '</div></div>';
  html += '<div class="week-banner-right"><div class="week-banner-store">' + (d.store || 'Skerries') + '</div>';
  html += '<div class="week-banner-gen">Generated: ' + fmtDate(d.generated_at) + '</div></div>';
  html += '</div>';

  html += '<div class="week-glance"><div class="week-glance-title">Week at a Glance</div><div class="week-glance-grid">';
  html += '<div class="week-glance-item"><div class="week-glance-label">Sales Inc VAT</div><div class="week-glance-val">' + fmt(d.weekly_sales_inc_vat) + '</div></div>';
  html += '<div class="week-glance-item"><div class="week-glance-label">Sales Ex VAT</div><div class="week-glance-val">' + fmt(d.weekly_sales_ex_vat) + '</div></div>';
  html += '<div class="week-glance-item"><div class="week-glance-label">Overall Margin</div><div class="week-glance-val' + (d.overall_margin_pct && d.overall_margin_pct > 18 ? '' : ' red') + '">' + fmtPct(d.overall_margin_pct) + '</div></div>';
  html += '<div class="week-glance-item"><div class="week-glance-label">Total Waste</div><div class="week-glance-val' + (d.waste_pct && d.waste_pct < 1.5 ? '' : ' red') + '">' + fmt(d.total_waste) + '</div></div>';
  html += '</div></div>';

  if (d.departments) {
    html += '<div class="card"><div class="card-title">P&L — Department Breakdown</div>';
    html += renderPnlTable(d.departments);
    html += '</div>';
  }

  if (d.generated_at) {
    html += '<div class="generated-badge">AI analysis generated: ' + fmtDate(d.generated_at) + '</div>';
  }

  if (d.executive_summary && d.executive_summary.length) {
    html += '<div class="card"><div class="card-title">Executive Summary</div><ul class="section-list">';
    d.executive_summary.forEach(function(b) { html += '<li>' + b + '</li>'; });
    html += '</ul></div>';
  }

  if (d.biggest_wins && d.biggest_wins.length) {
    html += '<div class="card"><div class="card-title">Biggest Wins</div><ul class="section-list">';
    d.biggest_wins.forEach(function(b) { html += '<li>' + b + '</li>'; });
    html += '</ul></div>';
  }

  if (d.biggest_risks && d.biggest_risks.length) {
    html += '<div class="card"><div class="card-title">Risks & Issues</div><ul class="section-list">';
    d.biggest_risks.forEach(function(b) { html += '<li>' + b + '</li>'; });
    html += '</ul></div>';
  }

  if (d.department_callouts && d.department_callouts.length) {
    html += '<div class="card"><div class="card-title">Department Call-Outs</div><ul class="section-list">';
    d.department_callouts.forEach(function(b) { html += '<li>' + b + '</li>'; });
    html += '</ul></div>';
  }

  if (d.action_plan && d.action_plan.length) {
    html += '<div class="card"><div class="card-title">Action Plan — Next Week</div><ol class="action-list">';
    d.action_plan.forEach(function(a) { html += '<li>' + a + '</li>'; });
    html += '</ol></div>';
  }

  el.innerHTML = html;
}

loadData();
</script>
</body>
</html>
