<script>
var SB_URL = 'https://mnebkteiwjxbbmnfotse.supabase.co';
var SB_KEY = 'sb_publishable_eutRHOftOW4ZJNlVrDKXOg_XtnBQ7cM';
var pin = '';
var busy = false;

async function hashPin(pin) {
  var msgBuffer = new TextEncoder().encode(pin);
  var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function updateDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd' + i);
    if (dot) dot.className = i < pin.length ? 'pin-dot filled' : 'pin-dot';
  }
  var btn = document.getElementById('loginBtn');
  var username = document.getElementById('username').value.trim();
  btn.disabled = pin.length < 4 || !username || busy;
}

function pressKey(digit) {
  if (pin.length >= 4 || busy) return;
  pin += digit;
  updateDots();
  if (pin.length === 4) { setTimeout(function() { tryLogin(); }, 150); }
}

function delKey() {
  if (busy) return;
  pin = pin.slice(0, -1);
  updateDots();
}

function clearPin() {
  if (busy) return;
  pin = '';
  updateDots();
}

function showError(msg) {
  var el = document.getElementById('errorBox');
  el.textContent = msg;
  el.className = 'error show';
  document.getElementById('loadingBox').className = 'loading';
}

function tryLogin() {
  var username = document.getElementById('username').value.trim().toLowerCase();
  if (!username || pin.length < 4 || busy) return;
  busy = true;
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('errorBox').className = 'error';
  document.getElementById('loadingBox').className = 'loading show';

  hashPin(pin).then(function(pinHash) {
    return fetch(SB_URL + '/rest/v1/portal_users?username=eq.' + encodeURIComponent(username) + '&pin_hash=eq.' + pinHash + '&active=eq.true&select=id,username,group_id,store_code,role,display_name', {
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json'
      }
    });
  }).then(function(r) { return r.json(); }).then(function(users) {
    if (!users || users.length === 0) {
      busy = false;
      document.getElementById('loadingBox').className = 'loading';
      showError('Invalid username or PIN');
      pin = '';
      updateDots();
      return;
    }
    var user = users[0];
    return fetch(SB_URL + '/rest/v1/group_stores?group_id=eq.' + user.group_id + (user.role !== 'admin' ? '&store_code=eq.' + user.store_code : '') + '&select=store_code,store_name', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).then(function(r) { return r.json(); }).then(function(stores) {
      var moduleAccess = {
        admin:         { haccp:true,  kpi:true,  reports:true,  pnl:true,  ai:true,  operations:true  },
        store_manager: { haccp:true,  kpi:true,  reports:true,  pnl:true,  ai:true,  operations:true  },
        duty:          { haccp:true,  kpi:true,  reports:true,  pnl:true,  ai:true,  operations:true  },
        deli:          { haccp:true,  kpi:false, reports:false, pnl:false, ai:false, operations:false },
        butcher:       { haccp:true,  kpi:false, reports:false, pnl:false, ai:false, operations:false },
        shopfloor:     { haccp:true,  kpi:false, reports:false, pnl:false, ai:false, operations:false },
        fv:            { haccp:true,  kpi:false, reports:false, pnl:false, ai:false, operations:false },
        hr:            { haccp:false, kpi:false, reports:false, pnl:false, ai:false, operations:true  }
      };
      localStorage.setItem('portal_session', JSON.stringify({
        session_id: user.id,
        user: {
          username: user.username,
          display_name: user.display_name,
          role: user.role,
          group_id: user.group_id,
          store_code: user.store_code,
          allowed_stores: stores || [],
          access: moduleAccess[user.role] || moduleAccess.shopfloor
        }
      }));
      var IS_HACCP = window.location.pathname.indexOf('haccp-system') !== -1;
      window.location.href = IS_HACCP ? '/haccp-system/index.html' : '/index.html';
    });
  }).catch(function(e) {
    busy = false;
    document.getElementById('loadingBox').className = 'loading';
    showError('Connection error. Please try again.');
    pin = '';
    updateDots();
  });
}

document.addEventListener('DOMContentLoaded', function() {
  var keys = ['1','2','3','4','5','6','7','8','9','0'];
  keys.forEach(function(k) {
    var btn = document.getElementById('pk' + k);
    if (btn) btn.addEventListener('click', function() { pressKey(k); });
  });
  document.getElementById('pkDel').addEventListener('click', delKey);
  document.getElementById('pkClear').addEventListener('click', clearPin);
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('username').addEventListener('input', updateDots);
});
</script>
