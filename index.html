<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moriarty Group – Select Store</title>
<script>if(!localStorage.getItem('portal_session')){location.replace('login.html');}</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#111111;color:white;min-height:100vh;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;}
.header{padding:44px 24px 32px;text-align:center;}
.logo-mark{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;width:68px;height:68px;background:#E41E26;border-radius:18px;font-size:30px;margin-bottom:16px;box-shadow:0 8px 32px rgba(228,30,38,0.45);}
.brand{font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:white;}
.estd{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);margin-top:4px;text-transform:uppercase;}
.select-label{font-size:13px;color:rgba(255,255,255,0.45);margin-top:18px;letter-spacing:0.5px;}
.stores{padding:8px 16px 20px;}
.store-tile{display:block;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:22px 20px;margin-bottom:14px;text-decoration:none;color:white;position:relative;overflow:hidden;}
.store-tile:active{background:rgba(228,30,38,0.15);border-color:rgba(228,30,38,0.5);}
.store-tile.last-visited{border-color:#E41E26;background:rgba(228,30,38,0.1);}
.store-code{font-size:10px;font-weight:700;color:rgba(255,255,255,0.38);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:5px;}
.store-name{font-size:24px;font-weight:700;letter-spacing:0.5px;}
.store-sub{font-size:12px;color:rgba(255,255,255,0.42);margin-top:5px;}
.store-arrow{position:absolute;right:20px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);font-size:26px;color:rgba(255,255,255,0.22);}
.store-tile.last-visited .store-arrow{color:#E41E26;}
.last-badge{position:absolute;top:14px;right:14px;background:#E41E26;color:white;font-size:9px;font-weight:700;letter-spacing:0.08em;padding:3px 9px;border-radius:10px;text-transform:uppercase;}
.divider{height:1px;background:rgba(255,255,255,0.07);margin:4px 16px 18px;}
.footer{text-align:center;padding:16px 14px 36px;font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:1px;text-transform:uppercase;margin-top:auto;}
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark">&#128722;</div>
  <div class="brand">Moriarty Group</div>
  <div class="estd">SuperValu &middot; Est. 1987</div>
  <div class="select-label">Select your store to continue</div>
</div>

<div class="stores" id="store-list"></div>

<div class="divider"></div>

<div class="footer">
  Moriarty Group &middot; SuperValu &middot; Internal Use Only<br>
  <span id="signout-link" style="cursor:pointer;color:rgba(255,255,255,0.28);text-decoration:underline;font-size:10px;">Sign Out</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var stores = [
    { code: '356', name: 'Palmerstown', sub: 'SuperValu Palmerstown', href: 'index-356.html' },
    { code: '374', name: 'Balbriggan',  sub: 'SuperValu Balbriggan',  href: 'index-374.html' },
    { code: '424', name: 'Skerries',    sub: 'SuperValu Skerries',    href: 'index-424.html' }
  ];

  var session = null;
  try {
    session = JSON.parse(localStorage.getItem('portal_session') || 'null');
  } catch (e) {
    session = null;
  }
  if (!session || !session.user) {
    location.replace('login.html');
    return;
  }

  var allowed = [];
  var i;
  if (session.user.role === 'admin') {
    allowed = ['356', '374', '424'];
  } else if (session.user.allowed_stores && session.user.allowed_stores.length) {
    for (i = 0; i < session.user.allowed_stores.length; i++) {
      allowed.push(String(session.user.allowed_stores[i].store_code));
    }
  } else if (session.user.store_code) {
    allowed = [String(session.user.store_code)];
  }

  var lastCode = localStorage.getItem('user_store') || '';
  var container = document.getElementById('store-list');
  var html = '';

  for (i = 0; i < stores.length; i++) {
    var s = stores[i];
    if (allowed.length && allowed.indexOf(s.code) === -1) { continue; }
    var isLast = (s.code === lastCode);
    html += '<a class="store-tile' + (isLast ? ' last-visited' : '') + '"';
    html += ' href="' + s.href + '"';
    html += ' onclick="selectStore(\'' + s.code + '\')">';
    html += '<div class="store-code">Store ' + s.code + '</div>';
    html += '<div class="store-name">' + s.name + '</div>';
    html += '<div class="store-sub">' + s.sub + '</div>';
    if (isLast) {
      html += '<div class="last-badge">Last Visited</div>';
    } else {
      html += '<div class="store-arrow">&#8250;</div>';
    }
    html += '</a>';
  }

  container.innerHTML = html;

  document.getElementById('signout-link').onclick = function() {
    localStorage.removeItem('portal_session');
    localStorage.removeItem('user_store');
    sessionStorage.removeItem('portal_auth_token');
    location.replace('login.html');
  };
});

function selectStore(code) {
  localStorage.setItem('user_store', code);
}
</script>

</body>
</html>
